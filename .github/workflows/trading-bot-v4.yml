name: Kraken Trading Bot V4

on:
  schedule:
    - cron: '*/10 * * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulation (true) or Live trading (false)'
        required: false
        default: 'false'
      use_sentiment:
        description: 'Use Sentiment Analysis'
        required: false
        default: 'true'
      use_onchain:
        description: 'Use On-Chain Metrics'
        required: false
        default: 'false'
      use_ensemble:
        description: 'Use Multi-Strategy Ensemble'
        required: false
        default: 'false'
      use_rl:
        description: 'Use RL Position Sizing'
        required: false
        default: 'false'

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Load RL state cache
      id: load-rl
      continue-on-error: true
      uses: actions/cache@v4
      with:
        path: rl_state.json
        key: rl-state-${{ github.run_number }}
        restore-keys: |
          rl-state-

    - name: Initialize RL state if missing
      run: |
        if [ ! -f rl_state.json ]; then
          echo '{"q_table": {}, "metadata": {"created": "init", "num_states": 0}}' > rl_state.json
        fi

    - name: Run Trading Bot V4
      env:
        KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
        KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}
        NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        USE_SENTIMENT_ANALYSIS: ${{ github.event.inputs.use_sentiment || 'true' }}
        MIN_SENTIMENT_CONFIDENCE: '0.5'

        USE_ONCHAIN_ANALYSIS: ${{ github.event.inputs.use_onchain || 'false' }}
        MIN_ONCHAIN_STRENGTH: '0.5'

        USE_ENSEMBLE_SYSTEM: ${{ github.event.inputs.use_ensemble || 'false' }}
        MIN_ENSEMBLE_CONSENSUS: '0.6'
        MIN_ENSEMBLE_CONFIDENCE: '0.6'

        USE_RL_POSITION_SIZING: ${{ github.event.inputs.use_rl || 'false' }}
        RL_LEARNING_RATE: '0.1'
        RL_DISCOUNT_FACTOR: '0.95'
        RL_EPSILON: '0.1'
        RL_STATE_FILE: 'rl_state.json'

        MAX_CORRELATION: '0.7'
        MAX_POSITIONS: '1'
        LEVERAGE: '3'
        MIN_BALANCE: '1.0'

        STOP_LOSS_PCT: '4.0'
        TAKE_PROFIT_PCT: '8.0'
        TRAILING_STOP_PCT: '2.5'
        MIN_PROFIT_FOR_TRAILING: '3.0'

        LOOKBACK_PERIOD: '180d'
        CANDLE_INTERVAL: '1h'
        USE_VOLUME_FILTER: 'true'
        REGIME_LOOKBACK: '30'

        USE_ML_VALIDATION: 'true'
        ML_CONFIDENCE_THRESHOLD: '0.6'

        DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      run: |
        echo "KRAKEN TRADING BOT V4"
        echo "Date: $(date)"
        echo "Mode: $([ "$DRY_RUN" = "true" ] && echo "SIMULATION" || echo "LIVE TRADING")"
        python kraken_bot_v4_advanced.py

    - name: Save RL state cache
      if: always()
      continue-on-error: true
      uses: actions/cache@v4
      with:
        path: rl_state.json
        key: rl-state-${{ github.run_number }}

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-logs-${{ github.run_number }}
        path: |
          *.log
          rl_state.json
        retention-days: 7
