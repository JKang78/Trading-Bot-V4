name: ML Paper Trading - h72 candidate (DISABLED)

# DEPRECATED: V2 (h=72, thr=0.68) is now the main config in ml-paper-trade.yml.
# This workflow is kept for reference but no longer runs on a schedule.

on:
  workflow_dispatch:

jobs:
  paper-trade-h72:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ML paper trader (legacy h72 candidate)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ML_PAPER_STATE_FILE: 'ml_paper_state_h72.json'
        ML_PAPER_SYMBOLS: 'XRP-USD,ADA-USD,SOL-USD'
        ML_PAPER_HORIZON: '72'
        ML_PAPER_BUY_THR: '0.68'
        ML_PAPER_SELL_THR: '0'
        ML_PAPER_LEVERAGE: '2'
        ML_PAPER_FEE: '0.0021'
      run: |
        echo "Legacy h72 candidate - use ml-paper-trade.yml instead"
        python ml_paper_trade.py
