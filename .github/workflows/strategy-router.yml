name: AI Strategy Router

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (true) or live trading (false)'
        required: false
        default: 'false'
      ai_enabled:
        description: 'Use OpenAI router decision'
        required: false
        default: 'true'

concurrency:
  group: ai-strategy-router
  cancel-in-progress: false

jobs:
  route:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore router state
      continue-on-error: true
      uses: actions/cache/restore@v4
      with:
        path: |
          strategy_router_state.json
          router_decisions.jsonl
          ml_live_state.json
          v4_position_state.json
        key: router-state-${{ github.run_number }}
        restore-keys: |
          router-state-
          ml-live-state-
          v4-position-state-

    - name: Run AI strategy router
      env:
        KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
        KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

        ROUTER_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        ROUTER_AI_ENABLED: ${{ github.event.inputs.ai_enabled || 'true' }}
        OPENAI_ROUTER_MODEL: 'gpt-5.5'
        OPENAI_ROUTER_REASONING_EFFORT: 'medium'
        ROUTER_DECISION_LOG_FILE: 'router_decisions.jsonl'
        ROUTER_MAX_OPEN_POSITIONS: '1'
        ROUTER_MAX_TRADE_MARGIN_FRACTION: '0.25'
        ROUTER_MAX_TOTAL_MARGIN_FRACTION: '0.35'
        ROUTER_MIN_TRADE_MARGIN_USD: '1.0'
        ROUTER_MAX_LEVERAGE: '2'
        ROUTER_ML_STRATEGIES: 'v2'
        ROUTER_ML_SYMBOLS: 'XRP-USD,ADA-USD,SOL-USD,LINK-USD,DOGE-USD'
        ROUTER_NOTIFY_NO_TRADE: 'false'

        NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        USE_SENTIMENT_ANALYSIS: 'true'
        USE_ONCHAIN_ANALYSIS: 'false'
        USE_ENSEMBLE_SYSTEM: 'true'
        USE_RL_POSITION_SIZING: 'false'
        MAX_POSITIONS: '1'
        LEVERAGE: '2'
        MIN_BALANCE: '1.0'
        USE_MAKER_ORDERS: 'true'
        STOP_LOSS_PCT: '4.0'
        TAKE_PROFIT_PCT: '8.0'
        TRAILING_STOP_PCT: '2.5'
        MIN_PROFIT_FOR_TRAILING: '3.0'
        LOOKBACK_PERIOD: '180d'
        CANDLE_INTERVAL: '1h'
        USE_VOLUME_FILTER: 'true'
        REGIME_LOOKBACK: '30'
        USE_ML_VALIDATION: 'true'
        ML_CONFIDENCE_THRESHOLD: '0.6'
      run: |
        echo "AI STRATEGY ROUTER"
        echo "Date: $(date)"
        echo "Mode: $([ "$ROUTER_DRY_RUN" = "true" ] && echo "DRY RUN" || echo "LIVE")"
        python strategy_router.py

    - name: Save router state
      if: always()
      continue-on-error: true
      uses: actions/cache/save@v4
      with:
        path: |
          strategy_router_state.json
          router_decisions.jsonl
          ml_live_state.json
          v4_position_state.json
        key: router-state-${{ github.run_number }}

    - name: Upload router state
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: router-state-${{ github.run_number }}
        path: |
          strategy_router_state.json
          router_decisions.jsonl
          ml_live_state.json
          v4_position_state.json
        retention-days: 30
