name: ML Strategy Paper Trading (DISABLED)

# Paper trading is disabled — live V2 runs in ml-live-trade.yml instead.
# Kept for manual workflow_dispatch testing only.

on:
  workflow_dispatch:

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # Persist the paper account (positions + equity) between runs, exactly
    # like the RL state cache the main bot uses.
    - name: Load paper state cache
      continue-on-error: true
      uses: actions/cache@v4
      with:
        path: ml_paper_state.json
        key: ml-paper-state-${{ github.run_number }}
        restore-keys: |
          ml-paper-state-

    - name: Run ML paper trader
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ML_PAPER_SYMBOLS: 'XRP-USD,ADA-USD,SOL-USD,LINK-USD,DOGE-USD'
        ML_PAPER_HORIZON: '72'
        ML_PAPER_BUY_THR: '0.68'
        ML_PAPER_SELL_THR: '0'
        ML_PAPER_EXIT_THR: '0.40'
        ML_PAPER_FNG_FEATURES: 'true'
        ML_PAPER_FNG_FILTER: 'true'
        ML_PAPER_LEVERAGE: '2'
        ML_PAPER_FEE: '0.0021'
        ML_PAPER_MAKER_ENTRY_FEE: '0.0023'
        ML_PAPER_TAKER_ENTRY_FEE: '0.0040'
        ML_PAPER_TAKER_EXIT_FEE: '0.0040'
        ML_PAPER_MARGIN_OPEN_FEE: '0.0002'
        ML_PAPER_ROLLOVER_FEE_4H: '0.0002'
        ML_PAPER_SPREAD_BUFFER: '0.0005'
        ML_PAPER_SLIPPAGE_BUFFER: '0.0010'
        ML_PAPER_MINIMUM_EDGE: '0'
        ML_PAPER_BTC_FEATURES: 'false'
        ML_PAPER_BTC_REGIME_FILTER: 'false'
        ML_PAPER_RELATIVE_STRENGTH_FILTER: 'false'
        ML_PAPER_EXPECTED_VALUE_FILTER: 'false'
      run: |
        echo "ML PAPER TRADING V2 (no real money)"
        echo "Date: $(date)"
        python ml_paper_trade.py

    - name: Save paper state cache
      if: always()
      continue-on-error: true
      uses: actions/cache@v4
      with:
        path: ml_paper_state.json
        key: ml-paper-state-${{ github.run_number }}

    - name: Upload paper state artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ml-paper-state-${{ github.run_number }}
        path: ml_paper_state.json
        retention-days: 14
