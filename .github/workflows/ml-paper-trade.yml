name: ML Strategy Paper Trading

# Paper-trades the V2 ML strategy on live data (no real orders).
# V2: h=72, thr=0.68, Fear&Greed features, adaptive exit, F&G filter.
# Backtested +6.30% expectancy/trade, PF 2.18 (walk-forward, honest fees).

on:
  schedule:
    - cron: '0 * * * *'   # hourly (data is 1h; holds are ~3 days)
  workflow_dispatch:

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # Persist the paper account (positions + equity) between runs, exactly
    # like the RL state cache the main bot uses.
    - name: Load paper state cache
      continue-on-error: true
      uses: actions/cache@v4
      with:
        path: ml_paper_state.json
        key: ml-paper-state-${{ github.run_number }}
        restore-keys: |
          ml-paper-state-

    - name: Run ML paper trader
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ML_PAPER_SYMBOLS: 'XRP-USD,ADA-USD,SOL-USD,LINK-USD,DOGE-USD'
        ML_PAPER_HORIZON: '72'
        ML_PAPER_BUY_THR: '0.68'
        ML_PAPER_SELL_THR: '0'
        ML_PAPER_EXIT_THR: '0.40'
        ML_PAPER_FNG_FEATURES: 'true'
        ML_PAPER_FNG_FILTER: 'true'
        ML_PAPER_LEVERAGE: '2'
        ML_PAPER_FEE: '0.0021'
      run: |
        echo "ML PAPER TRADING V2 (no real money)"
        echo "Date: $(date)"
        python ml_paper_trade.py

    - name: Save paper state cache
      if: always()
      continue-on-error: true
      uses: actions/cache@v4
      with:
        path: ml_paper_state.json
        key: ml-paper-state-${{ github.run_number }}

    - name: Upload paper state artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ml-paper-state-${{ github.run_number }}
        path: ml_paper_state.json
        retention-days: 14
